workflows:
  ios-release:
    name: FX Pro iOS release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - fxpro_env
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx yarn@1.22.22 install --frozen-lockfile
      - name: TypeScript check
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx yarn@1.22.22 tsc --noEmit
      - name: Generate iOS Xcode project
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx expo config --type public
          CI=1 npx expo prebuild --platform ios --clean --no-install
          test -n "$(find ios -maxdepth 1 -name '*.xcodeproj' -print -quit)"
          test -f ios/Podfile
      - name: Install CocoaPods
        script: |
          cd "$CM_BUILD_DIR/frontend/ios"
          pod install
          test -n "$(find . -maxdepth 1 -name '*.xcworkspace' -print -quit)"
      - name: Set up iOS code signing
        script: |
          cd "$CM_BUILD_DIR/frontend"

          IOS_BUNDLE_ID="com.fxpro2026.app"
          keychain initialize
          app-store-connect fetch-signing-files "$IOS_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

          cd "$CM_BUILD_DIR/frontend/ios"
          IOS_PROJECT="$(find . -maxdepth 1 -name '*.xcodeproj' -print -quit)"
          test -n "$IOS_PROJECT"
          xcode-project use-profiles --project "$IOS_PROJECT"

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if ! ls "$PROFILE_DIR"/*.mobileprovision >/dev/null 2>&1; then
            echo "No provisioning profiles were installed for $IOS_BUNDLE_ID."
            exit 1
          fi

          MATCHED_PROFILE=""
          for PROFILE in "$PROFILE_DIR"/*.mobileprovision; do
            if ! security cms -D -i "$PROFILE" > /tmp/fxpro_profile.plist; then
              continue
            fi

            APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/fxpro_profile.plist 2>/dev/null || true)
            if [[ "$APP_ID" == *".$IOS_BUNDLE_ID" ]]; then
              MATCHED_PROFILE="$PROFILE"
              break
            fi
          done

          if [ -z "$MATCHED_PROFILE" ]; then
            echo "No provisioning profile found for $IOS_BUNDLE_ID."
            exit 1
          fi

          echo "Matched provisioning profile: $MATCHED_PROFILE"
          /usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" /tmp/fxpro_profile.plist >/dev/null || {
            echo "The provisioning profile for $IOS_BUNDLE_ID does not include Push Notifications (aps-environment)."
            echo "Enable Push Notifications for this App ID in Apple Developer, then let Codemagic regenerate signing files."
            exit 1
          }
      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR/frontend"
          IOS_WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          IOS_SCHEME="$(basename "$IOS_WORKSPACE" .xcworkspace)"
          xcode-project build-ipa --workspace "$IOS_WORKSPACE" --scheme "$IOS_SCHEME"
    artifacts:
      - frontend/ios/*.xcodeproj
      - frontend/ios/*.xcworkspace
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  android-release:
    name: FX Pro Android release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - fxpro_env
      node: latest
      java: 21
    scripts:
      - name: Install JS dependencies
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx yarn@1.22.22 install --frozen-lockfile
      - name: TypeScript check
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx yarn@1.22.22 tsc --noEmit
      - name: Generate Android project
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx expo config --type public
          CI=1 npx expo prebuild --platform android --clean --no-install
          test -f android/gradlew
          chmod +x android/gradlew
      - name: Configure Android SDK
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/frontend/android/local.properties"
      - name: Build Android release
        script: |
          cd "$CM_BUILD_DIR/frontend/android"
          ./gradlew assembleRelease bundleRelease --no-daemon --console=plain
    artifacts:
      - frontend/android/app/build/outputs/apk/release/*.apk
      - frontend/android/app/build/outputs/bundle/release/*.aab
      - frontend/android/app/build/outputs/mapping/release/mapping.txt

  web-pwa:
    name: FX Pro Web PWA
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - fxpro_env
      node: latest
    scripts:
      - name: Install JS dependencies
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx yarn@1.22.22 install --frozen-lockfile
      - name: TypeScript check
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx yarn@1.22.22 tsc --noEmit
      - name: Export PWA
        script: |
          cd "$CM_BUILD_DIR/frontend"
          npx expo export --platform web
    artifacts:
      - frontend/dist/**
