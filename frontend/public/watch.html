<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FX Pro Stream</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #050505;
        color: #fff;
        font-family: Inter, Arial, sans-serif;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        border: 1px solid rgba(255, 255, 255, .14);
        border-radius: 18px;
        padding: 22px;
        background: rgba(255, 255, 255, .06);
      }
      .pill {
        display: inline-block;
        color: #000;
        background: #00ffff;
        border-radius: 999px;
        padding: 7px 10px;
        font-weight: 900;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <span class="pill">FX PRO STREAM</span>
        <h1>Ouverture du lecteur...</h1>
        <p>Redirection vers la page Regarder sans publicite.</p>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const id = params.get("id") || params.get("tmdb_id") || "";
      const mediaType = params.get("media_type") || "movie";
      const target = `/watch?media_type=${encodeURIComponent(mediaType)}&tmdb_id=${encodeURIComponent(id)}`;
      location.replace(target);
    </script>
  </body>
</html>
