<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>FX Pro 2026</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050505;
        color: #f7f7f7;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #050505;
      }

      main {
        width: min(420px, 100%);
        text-align: center;
      }

      img {
        width: 88px;
        height: 88px;
        border-radius: 22px;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #b8c0c7;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="FX Pro" />
      <h1>FX Pro 2026</h1>
      <p>Connexion indisponible. Reconnectez-vous pour synchroniser votre portefeuille.</p>
    </main>
  </body>
</html>
